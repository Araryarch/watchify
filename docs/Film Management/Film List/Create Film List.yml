info:
  name: Create Film List
  type: http
  seq: 1

http:
  method: POST
  url: "{{URL}}/api/v1/film-lists"
  body:
    type: json
    data: "{\r

      \    \"film_id\":\"3a30fbf0-c160-432a-b5e8-fa870d44a437\",\r

      \    \"list_status\":\"watching\"\r

      }"
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

