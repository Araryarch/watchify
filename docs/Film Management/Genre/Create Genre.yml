info:
  name: Create Genre
  type: http
  seq: 1

http:
  method: POST
  url: "{{URL}}/api/v1/genres"
  body:
    type: json
    data: "{\r\n    \"name\":\"cartoon\"\r\n}"
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Success
    request:
      url: "{{URL}}/api/v1/genres"
      method: POST
      body:
        type: json
        data: "{\r\n    \"name\":\"cartoon\"\r\n}"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Access-Control-Allow-Credentials
          value: "true"
        - name: Access-Control-Allow-Headers
          value: Origin, Content-Type, api_key, Content-Length, Accept-Encoding, X-CSRF-Token, Authorization
        - name: Access-Control-Allow-Methods
          value: POST, GET, OPTIONS, PATCH, PUT, DELETE, UPDATE
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Access-Control-Expose-Headers
          value: Content-Length
        - name: Access-Control-Max-Age
          value: "86400"
        - name: Cache-Control
          value: no-cache
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Sun, 20 Apr 2025 09:38:27 GMT
        - name: Content-Length
          value: "119"
      body:
        type: json
        data: |-
          {
              "success": true,
              "message": "success create genre",
              "data": {
                  "id": "c2470a1e-a26d-4571-b515-30afd2d8e02c",
                  "name": "cartoon"
              }
          }
  - name: Role Not Allowed
    request:
      url: "{{URL}}/api/v1/genres"
      method: POST
      body:
        type: json
        data: "{\r\n    \"name\":\"cartoon\"\r\n}"
    response:
      status: 403
      statusText: Forbidden
      headers:
        - name: Access-Control-Allow-Credentials
          value: "true"
        - name: Access-Control-Allow-Headers
          value: Origin, Content-Type, api_key, Content-Length, Accept-Encoding, X-CSRF-Token, Authorization
        - name: Access-Control-Allow-Methods
          value: POST, GET, OPTIONS, PATCH, PUT, DELETE, UPDATE
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Access-Control-Expose-Headers
          value: Content-Length
        - name: Access-Control-Max-Age
          value: "86400"
        - name: Cache-Control
          value: no-cache
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Sun, 20 Apr 2025 09:40:12 GMT
        - name: Content-Length
          value: "76"
      body:
        type: json
        data: |-
          {
              "success": false,
              "message": "user not authorized",
              "error": "role not allowed"
          }
