  url: "{{URL}}/api/ping"
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: Ping
    request:
      url: "{{URL}}/api/ping"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
