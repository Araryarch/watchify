info:
  name: Create Review
  type: http
  seq: 1

http:
  method: POST
  url: "{{URL}}/api/v1/reviews"
  body:
    type: json
    data: "{\r

      \    \"film_id\":\"2279d16a-2fd1-4b7c-beaf-35e535a287a9\",\r

      \    \"rating\":8,\r

      \    \"comment\":\"bagus sekali tung tung sahurnya kelihatan realistik\"\r

      }"
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: success
    request:
      url: "{{URL}}/api/v1/reviews"
      method: POST
      body:
        type: json
        data: "{\r

          \    \"film_id\":\"2279d16a-2fd1-4b7c-beaf-35e535a287a9\",\r

          \    \"rating\":9,\r

          \    \"comment\":\"bagus sekali tung tung sahurnya kelihatan realistik\"\r

          }"
    response:
      status: 200
      statusText: OK
      headers:
        - name: Access-Control-Allow-Credentials
          value: "true"
        - name: Access-Control-Allow-Headers
          value: Origin, Content-Type, api_key, Content-Length, Accept-Encoding, X-CSRF-Token, Authorization
        - name: Access-Control-Allow-Methods
          value: POST, GET, OPTIONS, PATCH, PUT, DELETE, UPDATE
        - name: Access-Control-Allow-Origin
          value: "*"
        - name: Access-Control-Expose-Headers
          value: Content-Length
        - name: Access-Control-Max-Age
          value: "86400"
        - name: Cache-Control
          value: no-cache
        - name: Content-Type
          value: application/json; charset=utf-8
        - name: Date
          value: Sun, 20 Apr 2025 15:20:55 GMT
        - name: Content-Length
          value: "50"
      body:
