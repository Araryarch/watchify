info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{URL}}/api/v1/auth/login"
  body:
    type: json
    data: "// {\r

      //     \"email\":\"atmin@email.com\",\r

      //     \"password\":\"myatmin123\"\r

      // }\r

      {\r

      \    \"email\":\"azkarizqullah127@gmail.com\",\r

      \    \"password\":\"Password.1\"\r

      }\r\n"
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: "var responseJson = res.getBody();\r

        bru.setEnvVar(\"TOKEN\", responseJson.data.token);"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

