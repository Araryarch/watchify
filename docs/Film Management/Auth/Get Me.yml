  type: http
  seq: 3

http:
  method: GET
  url: "{{URL}}/api/v1/auth/me"
  auth:
    type: bearer
    token: "{{TOKEN}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

